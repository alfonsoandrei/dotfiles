# Image rendering support for image.nvim
set -gq allow-passthrough on

# General settings
set -g default-terminal "tmux-256color"
set -g default-shell /bin/zsh

# Prefix: Control + Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Status bar
set -g status-interval 1
# set -g status-left-length 30
# set -g status-right-length 50
# set -g status-position top

# Mouse support
set -g mouse on

# Keep more history
set -g history-limit 50000

# Faster escape time (for vim)
set -g escape-time 0

# Start window indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Aggressive resize
setw -g aggressive-resize on

# Focus events (for vim)
set -g focus-events on

# Don't show useless info messages
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# Better colors
set -ga terminal-overrides ",xterm*:Tc"

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rose-pine/tmux'

# Rosé Pine theme
set -g @rose_pine_variant 'moon'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%a %d %b %H:%M'

# Battery in status bar
set -g @rose_pine_status_right_append_section '  #(ipconfig getifaddr en0 &>/dev/null && echo "󰤨" || echo "󰤭")  󰂁 #(pmset -g batt | grep -Eo "[0-9]+%%" | head -1) '

# Continuum options
set -g @continuum-restore 'on'

# vim-tmux-navigator keybindings
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'

bind -n C-h if-shell "ps -t #{pane_tty} | grep -iqE 'vim|nvim|view|fzf'" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "ps -t #{pane_tty} | grep -iqE 'vim|nvim|view|fzf'" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "ps -t #{pane_tty} | grep -iqE 'vim|nvim|view|fzf'" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "ps -t #{pane_tty} | grep -iqE 'vim|nvim|view|fzf'" "send-keys C-l" "select-pane -R"

bind -n C-BSpace if-shell "ps -t #{pane_tty} | grep -iqE 'vim|nvim|view|fzf'" "send-keys C-BSpace" "select-pane -l"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi C-BSpace select-pane -l

# Initialize TPM (must be last)
run -b '~/.tmux/plugins/tpm/tpm'

# Explicitly initialize plugins that affect appearance
run '~/.tmux/plugins/tmux/rose-pine.tmux'

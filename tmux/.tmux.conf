# Image rendering support for image.nvim
set -gq allow-passthrough on

# General settings
set -g default-terminal "tmux-256color"
set -g default-shell /bin/zsh

# Prefix: Control + Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Use vi keys in copy mode
setw -g mode-keys vi

# Custom binding for copy mode
bind [ copy-mode

# Status bar
set -g status-interval 5
# set -g status-left-length 30
# set -g status-right-length 50
# set -g status-position top

# Mouse support
set -g mouse on

# Keep more history
set -g history-limit 50000

# Faster escape time (for vim)
set -g escape-time 0

# Extended key support (Shift+Enter, Ctrl+Enter, etc.)
set -g extended-keys always

# Start window indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Aggressive resize
setw -g aggressive-resize on

# Focus events (for vim)
set -g focus-events on

# Don't show useless info messages
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# Better colors
set -ga terminal-overrides ",xterm*:Tc"

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rose-pine/tmux'

# Rosé Pine theme
set -g @rose_pine_variant 'moon'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%a %d %b %H:%M'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Battery in status bar
set -g @rose_pine_status_right_append_section '  #(ipconfig getifaddr en0 &>/dev/null && echo "󰤨" || echo "󰤭")  #(pmset -g batt | grep -q "AC Power" && echo "󰂄" || echo "󰂁") #(pmset -g batt | grep -Eo "[0-9]+%%" | head -1) '

# Continuum options
set -g @continuum-restore 'on'

# vim-tmux-navigator keybindings (handled by the TPM plugin)
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi C-BSpace select-pane -l

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# New window/pane location
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Make command prompt / messages highly visible
set -g message-style "bg=#eb6f92,fg=#232136,bold"
set -g message-command-style "bg=#eb6f92,fg=#232136,bold"
set -g display-time 4000

# Initialize TPM (must be last)
run -b '~/.tmux/plugins/tpm/tpm'

# Explicitly initialize plugins that affect appearance
run '~/.tmux/plugins/tmux/rose-pine.tmux'

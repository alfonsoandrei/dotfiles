# Let tmux own the clipboard so OSC 52 queries from neovim are handled
# internally and never reach Ghostty (prevents clipboard paste leakthrough)
set -g set-clipboard on

# General settings
set -g default-terminal "tmux-256color"
set -g default-shell /bin/zsh

# Prefix: Control + Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Use vi keys in copy mode
setw -g mode-keys vi

# Custom binding for copy mode
bind [ copy-mode

# Status bar
set -g status-interval 5
set -g status-position bottom

# Mouse support
set -g mouse on

# Keep more history
set -g history-limit 50000

# Faster escape time (for vim)
set -g escape-time 0

# Extended key support (Shift+Enter, Ctrl+Enter, etc.)
set -g extended-keys always

# Start window indexing at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Aggressive resize
setw -g aggressive-resize on

# Focus events (for vim)
set -g focus-events on

# Don't show useless info messages
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# Better colors
set -ga terminal-overrides ",xterm*:Tc"

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rose-pine/tmux'

# Rosé Pine theme
set -g @rose_pine_variant 'moon'
set -g @rose_pine_directory 'off'
set -g @rose_pine_date_time '%H:%M'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'
set -g @rose_pine_session_icon ''

# Battery in status bar
set -g @rose_pine_status_right_append_section '#[fg=#ea9a97] #(ipconfig getifaddr en0 &>/dev/null && echo "󰤨" || echo "󰤭") #(pmset -g batt | grep -q "AC Power" && echo "󰂄" || echo "󰂁") #(pmset -g batt | grep -Eo "[0-9]+%%" | head -1)#[default] '

# Continuum options
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'

# vim-tmux-navigator pattern (used by the plugin for its own detection)
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi C-BSpace select-pane -l

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Pane navigation handled by vim-tmux-navigator (respects fzf/vim process detection)

# Move focused window left and right
# swap-window to move
# select-window to stay focused
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# New window/pane location
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Make command prompt / messages highly visible
set -g message-style "bg=#eb6f92,fg=#232136,bold"
set -g message-command-style "bg=#eb6f92,fg=#232136,bold"
set -g display-time 4000


# Explicitly initialize plugins that affect appearance
run '~/.tmux/plugins/tmux/rose-pine.tmux'

# Initialize TPM (must be last; synchronous so  overrides below take effect after)
run '~/.tmux/plugins/tpm/tpm'

# Window formatting overrides (after rose-pine loads)
set -g status-left "#{?client_prefix,#[bg=#eb6f92 fg=#232136 bold],#[fg=#ea9a97]} #S#[default] "
set -g window-status-format "#W"
set -g window-status-current-format "#[underline]● #W#[no-underline]"
set -g window-status-separator " | "
set -g status-justify centre
# set -g status-format[0] "#{E:status-left}#[align=centre]#{W:#[#{window-status-style}]#{E:window-status-format}#[default]#{window-status-separator},#[#{window-status-current-style}]#{E:window-status-current-format}#[default]#{window-status-separator}}#[align=right]#{E:status-right}"

# Override plugin pane navigation with ps-based detection so fzf subprocesses
# (C-R, C-T, ts, gb, etc.) are detected even when pane_current_command is zsh
is_vim_or_fzf="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n C-h if-shell "$is_vim_or_fzf" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim_or_fzf" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim_or_fzf" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim_or_fzf" "send-keys C-l" "select-pane -R"
